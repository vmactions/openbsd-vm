            arch: "powerpc64"
          - runs: "ubuntu-24.04-arm"
            arch: "sparc64"
          - runs: "ubuntu-24.04-arm"
            arch: "ppc64le"
          - runs: "ubuntu-24.04-arm"
            arch: "s390x"
          - release: "7.7"
            arch: powerpc64
          - release: "7.7"
            arch: sparc64
          - release: "7.7"
            arch: ppc64le
          - release: "7.7"
            arch: s390x
