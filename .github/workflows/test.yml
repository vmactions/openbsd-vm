  testscp:
    strategy:
      fail-fast: false
      matrix:
        release: [ "7.7", "7.8", "7.9"
, ""]
        arch: [ "aarch64", "", "riscv64", "powerpc64", "sparc64", "ppc64le", "s390x"]
